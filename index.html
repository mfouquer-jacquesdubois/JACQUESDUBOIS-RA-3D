<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Viewer — Jacques Dubois</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e0e14;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem 1.25rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      background: #0e0e14;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: #4a5cff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 500;
      color: #e8e8e8;
    }

    header span {
      font-size: 12px;
      color: #666;
      margin-left: auto;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }

    /* Zone de dépôt / sélection */
    #drop-zone {
      border: 1.5px dashed rgba(74, 92, 255, 0.4);
      border-radius: 12px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(74, 92, 255, 0.04);
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #4a5cff;
      background: rgba(74, 92, 255, 0.08);
    }

    #drop-zone svg {
      width: 36px;
      height: 36px;
      stroke: #4a5cff;
      margin-bottom: 12px;
    }

    #drop-zone p {
      font-size: 15px;
      color: #c0c0c0;
      margin-bottom: 4px;
    }

    #drop-zone small {
      font-size: 12px;
      color: #555;
    }

    #file-input { display: none; }

    /* Infos fichier chargé */
    #file-info {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }

    #file-info svg {
      width: 20px;
      height: 20px;
      stroke: #4a5cff;
      flex-shrink: 0;
    }

    #file-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #file-size {
      font-size: 12px;
      color: #666;
      flex-shrink: 0;
    }

    #change-btn {
      background: none;
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #999;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #change-btn:hover { color: #e8e8e8; border-color: rgba(255,255,255,0.3); }

    /* Viewer */
    #viewer-wrap {
      display: none;
      border-radius: 12px;
      overflow: hidden;
      background: #16161f;
      border: 0.5px solid rgba(255,255,255,0.06);
      position: relative;
    }

    model-viewer {
      width: 100%;
      height: 60vw;
      max-height: 400px;
      min-height: 220px;
      --progress-bar-color: #4a5cff;
      --progress-mask: none;
    }

    /* Bouton AR principal */
    #ar-btn {
      display: none;
      width: 100%;
      padding: 0.9rem;
      background: #4a5cff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, transform 0.1s;
    }

    #ar-btn:hover { background: #3a4cef; }
    #ar-btn:active { transform: scale(0.98); }

    #ar-btn svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      flex-shrink: 0;
    }

    /* Message pas AR dispo */
    #no-ar {
      display: none;
      text-align: center;
      font-size: 13px;
      color: #666;
      padding: 0.5rem;
    }

    /* Instructions */
    .instructions {
      display: none;
      gap: 0.5rem;
      flex-direction: column;
    }

    .instructions p {
      font-size: 12px;
      color: #555;
      text-align: center;
    }

    /* Contrôles viewer */
    .viewer-controls {
      display: none;
      gap: 8px;
    }

    .ctrl-btn {
      flex: 1;
      padding: 0.6rem;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #999;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: color 0.15s, background 0.15s;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.08); color: #e8e8e8; }
    .ctrl-btn.active { color: #4a5cff; border-color: #4a5cff; background: rgba(74,92,255,0.08); }

    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 11px;
      color: #333;
      border-top: 0.5px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">JD</div>
  <h1>AR Viewer</h1>
  <span>Jacques Dubois</span>
</header>

<main>

  <!-- Sélection fichier -->
  <div id="drop-zone">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>Appuyer pour charger un fichier</p>
    <small>.glb · .gltf</small>
    <input type="file" id="file-input" accept=".glb,.gltf" />
  </div>

  <!-- Infos fichier -->
  <div id="file-info">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
    <span id="file-name">—</span>
    <span id="file-size"></span>
    <button id="change-btn">Changer</button>
  </div>

  <!-- Viewer 3D -->
  <div id="viewer-wrap">
    <model-viewer
      id="mv"
      camera-controls
      auto-rotate
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="fixed"
      shadow-intensity="1"
      environment-image="neutral"
      exposure="1">
    </model-viewer>
  </div>

  <!-- Contrôles -->
  <div class="viewer-controls" id="viewer-controls">
    <button class="ctrl-btn active" id="btn-rotate" onclick="toggleAutoRotate()">⟳ Rotation auto</button>
    <button class="ctrl-btn" id="btn-reset" onclick="resetCamera()">↺ Vue initiale</button>
  </div>

  <!-- Bouton AR -->
  <button id="ar-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
      <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
      <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
      <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
      <path d="M12 8l-4 2v4l4 2 4-2v-4z"/>
      <line x1="12" y1="8" x2="12" y2="14"/>
      <line x1="8" y1="10" x2="16" y2="10"/>
    </svg>
    Voir en réalité augmentée
  </button>

  <div id="no-ar">La réalité augmentée n'est pas disponible sur cet appareil.<br>Utilisez un iPhone (iOS 12+) ou un Android compatible ARCore.</div>

  <div class="instructions" id="instructions">
    <p>Pointez la caméra vers le sol pour placer le modèle.</p>
  </div>

</main>

<footer>Jacques Dubois · Visualiseur AR interne</footer>

<script>
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const fileInfo = document.getElementById('file-info');
  const fileName = document.getElementById('file-name');
  const fileSize = document.getElementById('file-size');
  const changeBtn = document.getElementById('change-btn');
  const viewerWrap = document.getElementById('viewer-wrap');
  const mv = document.getElementById('mv');
  const arBtn = document.getElementById('ar-btn');
  const noAr = document.getElementById('no-ar');
  const instructions = document.getElementById('instructions');
  const viewerControls = document.getElementById('viewer-controls');
  const btnRotate = document.getElementById('btn-rotate');
  let autoRotateOn = true;
  let objectUrl = null;

  dropZone.addEventListener('click', () => fileInput.click());
  changeBtn.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    if (objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl = URL.createObjectURL(file);

    fileName.textContent = file.name;
    fileSize.textContent = formatSize(file.size);

    mv.src = objectUrl;

    dropZone.style.display = 'none';
    fileInfo.style.display = 'flex';
    viewerWrap.style.display = 'block';
    viewerControls.style.display = 'flex';

    mv.addEventListener('load', () => {
      if (mv.canActivateAR) {
        arBtn.style.display = 'flex';
        instructions.style.display = 'flex';
        noAr.style.display = 'none';
      } else {
        arBtn.style.display = 'none';
        noAr.style.display = 'block';
      }
    }, { once: true });
  }

  arBtn.addEventListener('click', () => {
    mv.activateAR();
  });

  function toggleAutoRotate() {
    autoRotateOn = !autoRotateOn;
    mv.autoRotate = autoRotateOn;
    btnRotate.classList.toggle('active', autoRotateOn);
  }

  function resetCamera() {
    mv.cameraOrbit = 'auto auto auto';
    mv.cameraTarget = 'auto auto auto';
    mv.fieldOfView = 'auto';
  }

  function formatSize(bytes) {
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' Ko';
    return (bytes / (1024 * 1024)).toFixed(1) + ' Mo';
  }
</script>

</body>
</html>
